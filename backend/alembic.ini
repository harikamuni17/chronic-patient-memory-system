# Alembic configuration file
# Reference: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts (relative to this file)
script_location = alembic

# Template for migration filenames: timestamp_slug.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for timestamps in migration filenames
timezone = UTC

# Max length of the revision ID portion of the filename
truncate_slug_length = 40

# SQLAlchemy connection URL
# Overridden at runtime by env.py reading DATABASE_URL from .env
sqlalchemy.url = sqlite:///./chronic_patients.db


[post_write_hooks]
# Optional: run Black formatter on newly generated migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
